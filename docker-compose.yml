version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: webgis_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./backend/public:/var/www/backend/public:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - webgis_network

  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: webgis_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-webgis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-webgis_secure_password}
      POSTGRES_DB: ${DB_DATABASE:-webgis_drainase}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - webgis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-webgis_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webgis_backend
    restart: always
    working_dir: /var/www/backend
    environment:
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-webgis_drainase}
      - DB_USERNAME=${DB_USERNAME:-webgis_user}
      - DB_PASSWORD=${DB_PASSWORD:-webgis_secure_password}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
    volumes:
      - ./backend:/var/www/backend
      - ./backend/storage:/var/www/backend/storage
      - ./backend/bootstrap/cache:/var/www/backend/bootstrap/cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webgis_network
    command: sh -c "php artisan migrate --force && php-fpm"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    container_name: webgis_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - webgis_network
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: webgis_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webgis_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  webgis_network:
    driver: bridge
